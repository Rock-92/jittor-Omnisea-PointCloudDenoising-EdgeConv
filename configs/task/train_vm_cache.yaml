mode: train
debug: False

components:
  data: train_cache
  transform: vm_cache
  system: vm
  model: vm

loss:
  displacement_loss: 0.9
  normalized_surface_loss: 0.1

optimizer:
  __target__: adam
  lr: 0.00001

trainer:
  epochs: 100
  log_score: True
  score_every_n_epochs: 1
  score_max_samples: 0
  training_log_path: outputs/training_log.csv
  create_submission_on_train_end: True
  submission_use_best: True
  submission_source_dir: outputs/submission
  submission_zip_path: outputs/result.zip

writer:
  __target__: vm
  save_dir: outputs/submission
  save_name: denoised
